# Site settings
title: 个人主页
description: 个人学术主页 - 研究与思考
author: Your Name
email: your.email@example.com
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site

# Build settings
markdown: kramdown
highlighter: rouge

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/
  tech:
    output: true
    permalink: /blog/tech/:year/:month/:day/:title/
  essays:
    output: true
    permalink: /blog/essays/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Your Name"
  - scope:
      path: ""
      type: "tech"
    values:
      layout: "post"
      author: "Your Name"
      category: "技术博客"
  - scope:
      path: ""
      type: "essays"
    values:
      layout: "post"
      author: "Your Name"
      category: "随笔杂文"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

# Include
include:
  - _pages

# Timezone
timezone: Asia/Shanghai

# Language
lang: zh-CN
