<footer class="site-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-section">
        <h3>{{ site.title }}</h3>
        <p>{{ site.description }}</p>
      </div>
      
      <div class="footer-section">
        <h4>快速链接</h4>
        <ul>
          <li><a href="{{ '/' | relative_url }}">首页</a></li>
          <li><a href="{{ '/blog/' | relative_url }}">博客</a></li>
          <li><a href="{{ '/#publications' | relative_url }}">论文</a></li>
        </ul>
      </div>
      
      <div class="footer-section">
        <h4>联系方式</h4>
        <ul class="contact-info">
          <li><a href="mailto:{{ site.email }}">{{ site.email }}</a></li>
        </ul>
      </div>
    </div>
    
    <div class="footer-bottom">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
      <p>Powered by <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a> & <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></p>
    </div>
  </div>
</footer>
