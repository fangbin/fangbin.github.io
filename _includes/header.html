<header class="site-header">
  <div class="container">
    <nav class="site-nav">
      <a class="site-title" href="{{ '/' | relative_url }}">
        {{ site.title | escape }}
      </a>
      
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span class="hamburger"></span>
      </button>
      
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>首页</a></li>
        <li><a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>博客</a></li>
        <li><a href="{{ '/#publications' | relative_url }}">论文</a></li>
        <li><a href="{{ '/#education' | relative_url }}">教育</a></li>
        <li><a href="{{ '/#work' | relative_url }}">经历</a></li>
        <li><a href="{{ '/#contact' | relative_url }}">联系</a></li>
      </ul>
    </nav>
  </div>
</header>
